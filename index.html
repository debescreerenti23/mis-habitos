<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker Pro | Portfolio javilindj</title>
    
    <meta property="og:title" content="Habit Tracker Pro - Gestión de Hábitos Inteligente">
    <meta property="og:description" content="App funcional con persistencia de datos, modo oscuro y calendario de consistencia. Desarrollada con JavaScript Vanila por javilindj.">
    <meta property="og:type" content="website">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <meta name="theme-color" id="meta-theme" content="#28a745">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>
<body data-theme="light">

<div class="card">
    <button class="btn-dark-mode" onclick="toggleDarkMode()" id="dark-icon">🌙</button>
    <h1>Mi rutina diaria</h1>
    <span id="fecha"></span>
    <span id="frase-motivadora">Cargando inspiración...</span>

    <div class="stats">
        <div class="stat-box"><span class="stat-number" id="racha-dias">0</span><span class="stat-label">🔥 Racha</span></div>
        <div class="stat-box"><span class="stat-number" id="total-completados">0</span><span class="stat-label">🏆 Total</span></div>
    </div>

    <div class="progreso-container"><div id="barra-progreso"></div></div>

    <div class="input-group">
        <input type="text" id="nueva-tarea" placeholder="Nuevo hábito...">
        <button class="btn-add" onclick="agregarTareaManual()">+</button>
    </div>

    <div id="lista-tareas"></div>
    <button class="btn-reiniciar" onclick="borrarTodo()">Reiniciar Datos</button>
</div>

<div class="card">
    <h2 style="color:var(--text-main); font-size: 1.1rem; margin-top: 0;">Mi Consistencia</h2>
    <div class="calendar-grid" id="calendar-grid"></div>
</div>

<div class="modal" id="modal-detalles">
    <div class="modal-content">
        <h3 id="modal-fecha-titulo" style="color:var(--text-main); margin-top:0;">Detalles</h3>
        <div id="modal-lista"></div>
        <button onclick="cerrarModal()" style="background:#28a745; color:white; border:none; padding:12px; width:100%; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer;">Cerrar</button>
    </div>
</div>

<footer>javilindj - All Rights Reserved &copy; <span id="year"></span></footer>

<script src="main.js"></script>
</body>
</html>
